trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  vmImage: "ubuntu-latest"

variables:
  NODE_VERSION: "lts/*"
  PLAYWRIGHT_HTML_OPEN: "never"

steps:
  - checkout: self

  - task: NodeTool@0
    displayName: "Use Node.js $(NODE_VERSION)"
    inputs:
      versionSpec: "$(NODE_VERSION)"

  - script: |
      echo "MS_EMAIL_SET=$([ -n "$MS_EMAIL" ] && echo true || echo false)"
      echo "MS_PASSWORD_SET=$([ -n "$MS_PASSWORD" ] && echo true || echo false)"
    displayName: "Validate required env presence (safe)"

  - script: |
      missing=()
      [ -z "$MS_EMAIL" ] && missing+=("MS_EMAIL")
      [ -z "$MS_PASSWORD" ] && missing+=("MS_PASSWORD")

      if [ ${#missing[@]} -gt 0 ]; then
        echo "Missing required variables: ${missing[*]}"
        exit 1
      fi
    displayName: "Fail fast when required env is missing"

  - script: npm ci
    displayName: "Install dependencies"

  - script: npx playwright install --with-deps
    displayName: "Install Playwright browsers"

  - script: |
      npx playwright test tests/login tests/settings "tests/timesheet by day" "tests/timesheet by month" tests/ufavourite "tests/timesheet overview" --workers=1
    displayName: "Run Playwright tests (ordered)"
    env:
      MS_EMAIL: $(MS_EMAIL)
      MS_PASSWORD: $(MS_PASSWORD)
      PLAYWRIGHT_HTML_OPEN: $(PLAYWRIGHT_HTML_OPEN)
    continueOnError: true

  - script: |
      node scripts/send-slack-report.js
    displayName: "Send Slack report"
    condition: and(always(), ne(variables['SLACK_WEBHOOK_URL'], ''))
    env:
      SLACK_WEBHOOK_URL: $(SLACK_WEBHOOK_URL)
      SLACK_BOT_TOKEN: $(SLACK_BOT_TOKEN)
      SLACK_CHANNEL_ID: $(SLACK_CHANNEL_ID)
      SLACK_TEST_DETAIL_LIMIT: "100"

  - task: PublishPipelineArtifact@1
    displayName: "Publish Playwright HTML report artifact"
    condition: always()
    inputs:
      targetPath: "playwright-report"
      artifact: "playwright-report"
      publishLocation: "pipeline"

  - task: PublishPipelineArtifact@1
    displayName: "Publish test-results artifact"
    condition: always()
    inputs:
      targetPath: "test-results"
      artifact: "test-results"
      publishLocation: "pipeline"
