name: Playwright Tests

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  SLACK_TEST_DETAIL_LIMIT: "25"

steps:
  - checkout: self

  - task: NodeTool@0
    inputs:
      versionSpec: "lts/*"
    displayName: "Use Node.js (LTS)"

  - bash: |
      echo "HAS_SECRET_MS_EMAIL=$([ -n "$(MS_EMAIL)" ] && echo true || echo false)"
      echo "HAS_SECRET_MS_PASSWORD=$([ -n "$(MS_PASSWORD)" ] && echo true || echo false)"
      echo "HAS_SECRET_SLACK_WEBHOOK_URL=$([ -n "$(SLACK_WEBHOOK_URL)" ] && echo true || echo false)"
    displayName: "Validate secret bindings (safe)"

  - bash: |
      echo "MS_EMAIL_SET=$([ -n "$(MS_EMAIL)" ] && echo true || echo false)"
      echo "MS_PASSWORD_SET=$([ -n "$(MS_PASSWORD)" ] && echo true || echo false)"
    displayName: "Validate required env presence (safe)"

  - bash: |
      missing=()

      [ -z "$(MS_EMAIL)" ] && missing+=("MS_EMAIL")
      [ -z "$(MS_PASSWORD)" ] && missing+=("MS_PASSWORD")

      if [ ${#missing[@]} -gt 0 ]; then
        echo "Missing required secrets/variables: ${missing[*]}"
        exit 1
      fi
    displayName: "Fail fast when required env is missing"

  - bash: npm ci
    displayName: "Install dependencies"

  - bash: npx playwright install --with-deps
    displayName: "Install Playwright browsers"

  - bash: |
      set +e
      npx playwright test tests/login tests/settings "tests/timesheet by day" "tests/timesheet by month" tests/ufavourite "tests/timesheet overview" --workers=1
      exitCode=$?

      if [ $exitCode -eq 0 ]; then
        echo "##vso[task.setvariable variable=PLAYWRIGHT_OUTCOME]success"
      else
        echo "##vso[task.setvariable variable=PLAYWRIGHT_OUTCOME]failure"
      fi

      echo "Playwright exit code: $exitCode"
      exit 0
    displayName: "Run Playwright tests (capture outcome)"
    env:
      MS_EMAIL: $(MS_EMAIL)
      MS_PASSWORD: $(MS_PASSWORD)

  - task: PublishPipelineArtifact@1
    displayName: "Publish Playwright HTML report"
    inputs:
      targetPath: "playwright-report"
      artifact: "playwright-report"
      publishLocation: "pipeline"
    condition: always()

  - bash: node scripts/send-slack-report.js
    displayName: "Send Slack report"
    condition: and(always(), ne(variables['SLACK_WEBHOOK_URL'], ''))
    env:
      SLACK_WEBHOOK_URL: $(SLACK_WEBHOOK_URL)
      SLACK_BOT_TOKEN: $(SLACK_BOT_TOKEN)
      SLACK_CHANNEL_ID: $(SLACK_CHANNEL_ID)
      PLAYWRIGHT_OUTCOME: $(PLAYWRIGHT_OUTCOME)
      PLAYWRIGHT_REPORT_URL: "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
      SLACK_TEST_DETAIL_LIMIT: $(SLACK_TEST_DETAIL_LIMIT)

  - bash: |
      if [ "$(PLAYWRIGHT_OUTCOME)" = "failure" ]; then
        echo "Playwright tests failed. Failing pipeline."
        exit 1
      fi
      echo "Playwright tests passed."
    displayName: "Fail pipeline if tests failed"
    condition: always()